server {
    listen 80;
    listen [::]:80;
    server_name webmail.diworkin.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webmail.diworkin.com;

    root /usr/share/roundcube;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/mail.diworkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.diworkin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/webmail.access.log;
    error_log /var/log/nginx/webmail.error.log;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~* ^/(README|INSTALL|LICENSE|SQL|config|temp|logs)/ {
        deny all;
    }
}

