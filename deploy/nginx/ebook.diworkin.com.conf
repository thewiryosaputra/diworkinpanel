server {
    listen 80;
    listen [::]:80;
    server_name ebook.diworkin.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ebook.diworkin.com;

    root /var/www/diworkin-ebook;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/diworkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diworkin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/ebook.access.log;
    error_log /var/log/nginx/ebook.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|webp|gif|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}

