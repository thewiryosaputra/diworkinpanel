server {
    listen 80;
    listen [::]:80;
    server_name laravel.diworkin.com www.laravel.diworkin.com;

    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name laravel.diworkin.com www.laravel.diworkin.com;

    ssl_certificate /etc/letsencrypt/live/laravel.diworkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laravel.diworkin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/diworkin-sites/diworkin.com/subdomains/laravel/public/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/laravel.diworkin.com.access.log;
    error_log /var/log/nginx/laravel.diworkin.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }
}

