server {
    listen 80;
    listen [::]:80;
    server_name panel.diworkin.com email.diworkin.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panel.diworkin.com email.diworkin.com;

    root /var/www/diworkin-panel;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/diworkin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diworkin.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/panel.access.log;
    error_log /var/log/nginx/panel.error.log;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|svg|ico|webp|gif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}

